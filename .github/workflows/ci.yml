name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  model-evaluation:
    name: Python model contracts
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            model-service/requirements-api.txt
            model-service/requirements-test.txt

      - name: Install API contract-test dependencies
        run: python -m pip install -r model-service/requirements-test.txt

      - name: Validate evaluation dataset
        run: |
          python model-service/scripts/build_domain_dataset.py --check
          python model-service/scripts/validate_dataset.py

      - name: Run evaluation and API contract tests
        run: python -m pytest model-service/tests -q

      - name: Compile Python sources
        run: >-
          python -m py_compile
          model-service/scripts/build_domain_dataset.py
          model-service/scripts/evaluation_lib.py
          model-service/scripts/validate_dataset.py
          model-service/scripts/evaluate_predictions.py
          model-service/scripts/select_thresholds.py
          model-service/scripts/run_hf_evaluation.py
          model-service/app/settings.py
          model-service/app/schemas.py
          model-service/app/model_manifest.py
          model-service/app/runtime.py
          model-service/app/service.py
          model-service/app/main.py

  java:
    name: Java verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Compile, test, and package
        run: ./mvnw --batch-mode --no-transfer-progress verify
