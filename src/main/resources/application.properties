spring.application.name=contentfilter
spring.mvc.problemdetails.enabled=true

# Reject oversized multipart bodies in the web layer before Apache POI parses them.
spring.servlet.multipart.max-file-size=${CONTENT_FILTER_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${CONTENT_FILTER_MAX_REQUEST_SIZE:6MB}

# V1 resource limits. Raising these values requires load and memory testing.
content-filter.upload.max-file-size=${CONTENT_FILTER_MAX_FILE_SIZE:5MB}
content-filter.upload.max-worksheets=${CONTENT_FILTER_MAX_WORKSHEETS:10}
content-filter.upload.max-physical-rows=${CONTENT_FILTER_MAX_PHYSICAL_ROWS:10000}
content-filter.upload.max-sequences=${CONTENT_FILTER_MAX_SEQUENCES:2000}
content-filter.upload.max-cells-per-sequence=${CONTENT_FILTER_MAX_CELLS_PER_SEQUENCE:100}
content-filter.upload.max-sequence-length=${CONTENT_FILTER_MAX_SEQUENCE_LENGTH:4000}
content-filter.upload.max-total-text-length=${CONTENT_FILTER_MAX_TOTAL_TEXT_LENGTH:1000000}
content-filter.upload.max-processing-time=${CONTENT_FILTER_MAX_PROCESSING_TIME:60s}

# Module 3 decision policy. These defaults must be replaced only through a
# versioned, evaluated policy change; the deterministic adapter is not a model.
content-filter.classification.policy.version=${CONTENT_FILTER_POLICY_VERSION:risk-policy-v1}
content-filter.classification.policy.uncertainty-margin=${CONTENT_FILTER_POLICY_UNCERTAINTY_MARGIN:0.05}
content-filter.classification.policy.thresholds.threat=${CONTENT_FILTER_THRESHOLD_THREAT:0.80}
content-filter.classification.policy.thresholds.hate-or-identity-attack=${CONTENT_FILTER_THRESHOLD_HATE:0.80}
content-filter.classification.policy.thresholds.harassment-or-insult=${CONTENT_FILTER_THRESHOLD_HARASSMENT:0.75}
content-filter.classification.policy.thresholds.obscene-or-profane=${CONTENT_FILTER_THRESHOLD_PROFANITY:0.75}
content-filter.classification.policy.thresholds.general-toxicity=${CONTENT_FILTER_THRESHOLD_TOXICITY:0.70}
content-filter.classification.policy.precedence=THREAT,HATE_OR_IDENTITY_ATTACK,HARASSMENT_OR_INSULT,OBSCENE_OR_PROFANE,GENERAL_TOXICITY

# Finish in-flight requests during a controlled container shutdown.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Expose only the minimum operational endpoints in V1.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=@project.version@
